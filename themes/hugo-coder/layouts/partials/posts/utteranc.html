{{- with .Site.Params.utteranc -}}
{{- if and (not (eq (.repo | default "") "" )) (eq ($.Params.disable_comments | default false) false) -}}
<script src="https://utteranc.es/client.js"
  repo= "{{ .repo }}"
  issue-term="{{ default "title" .issueTerm }}"
  theme="{{ default "github-light" .theme }}"
  crossorigin="anonymous"
  async>
</script>
{{- end -}}
{{- end -}}
